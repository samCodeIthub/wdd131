<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Samuel Motey Howard |WDD131">
    <meta name="description" content="A responsive photo album showcasing Latter-day Saint temples from around the world, including Salt Lake and Accra Ghana.">
    <title>Temple Album</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>

<body>
    <header>
        <h1>Temple Album</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>

    <main>
        <h2>Home</h2>
        <div class="gallery">
            <figure>

            <figure>
                <img src="images/hongkongchina.jpg" alt="Hong Kong China Temple">

            <figure>
                <img src="images/kirtland.jpg" alt="Kirtland Temple">
                <figcaption>Kirtland Temple</figcaption>
            </figure>

            <figure>
                <img src="images/londonengland.jpg" alt="London England Temple">
                <figcaption>London England Temple</figcaption>
            </figure>

            <figure>
                <img src="images/provocitycenter.jpg" alt="Provo City Center Temple">
                <figcaption>Provo City Center Temple</figcaption>
            </figure>

            <figure>
                <img src="images/romeitaly.jpg" alt="Rome Italy Temple">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>

            <figure>
                <img src="images/saltlake.jpg" alt="Salt Lake Temple">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>

            <figure>
                <img src="images/sydneyaustralia.jpg" alt="Sydney Australia Temple">
                <figcaption>Sydney Australia Temple</figcaption>
            </figure>

            <figure>
                <img src="images/saopaulobrazil.jpg" alt="São PauloBrazil Temple">
                <figcaption>São PauloBrazil Temple</figcaption>

    </main>


    <footer>
        <p>&copy; <span id="currentyear"></span>👌Samuel Motey Howard👌 Ghana</p>
